<!DOCTYPE html>

<html class="light" lang="it"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Sondaggi Al Top</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#f9f9ff",
                        "tertiary-container": "#b75b00",
                        "surface-variant": "#e1e2ec",
                        "surface-container": "#ecedf7",
                        "on-tertiary-fixed": "#311400",
                        "tertiary-fixed": "#ffdcc6",
                        "on-secondary-fixed-variant": "#304671",
                        "on-tertiary-fixed-variant": "#723600",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#0058be",
                        "error-container": "#ffdad6",
                        "surface-dim": "#d8d9e3",
                        "primary-container": "#2170e4",
                        "secondary-container": "#b6ccff",
                        "secondary": "#495e8a",
                        "tertiary": "#924700",
                        "primary-fixed": "#d8e2ff",
                        "on-primary-fixed": "#001a42",
                        "on-primary-container": "#fefcff",
                        "tertiary-fixed-dim": "#ffb786",
                        "secondary-fixed": "#d8e2ff",
                        "on-secondary-container": "#405682",
                        "inverse-surface": "#2e3038",
                        "outline": "#727785",
                        "on-secondary-fixed": "#001a42",
                        "on-primary-fixed-variant": "#004395",
                        "surface-container-high": "#e6e7f2",
                        "primary-fixed-dim": "#adc6ff",
                        "on-surface": "#191b23",
                        "surface-container-low": "#f2f3fd",
                        "inverse-primary": "#adc6ff",
                        "outline-variant": "#c2c6d6",
                        "surface-container-highest": "#e1e2ec",
                        "error": "#ba1a1a",
                        "on-error": "#ffffff",
                        "on-tertiary-container": "#fffbff",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#b1c6f9",
                        "surface-bright": "#f9f9ff",
                        "inverse-on-surface": "#eff0fa",
                        "on-background": "#191b23",
                        "background": "#f9f9ff",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#005ac2",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#424754"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-shift {
            transition: background-color 0.3s ease;
        }
        .glass-header {
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- Suppressing TopNavBar and Footer for Focused Transactional Journey (Login) as per Shell Visibility Rules -->
<main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
<!-- Abstract Background Element -->
<div class="absolute top-[-10%] right-[-5%] w-[40rem] h-[40rem] rounded-full bg-gradient-to-br from-primary-fixed/30 to-transparent blur-3xl -z-10"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[30rem] h-[30rem] rounded-full bg-gradient-to-tr from-secondary-container/20 to-transparent blur-3xl -z-10"></div>
<div class="w-full max-w-[440px] z-10">
<!-- Brand Identity Section -->
<div class="text-center mb-10">
<h1 class="font-headline font-black text-4xl text-primary tracking-tight mb-2">Sondaggi Al Top</h1>
<p class="text-on-surface-variant body-lg">Bentornato. Accedi per gestire i tuoi sondaggi.</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-10 shadow-sm transition-all duration-300">
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-medium text-on-surface label-md px-1" for="email">Indirizzo Email</label>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3.5 text-on-surface focus:ring-0 focus:bg-surface-container-low transition-all duration-200 border-b-2 border-transparent focus:border-primary placeholder:text-outline-variant" id="email" name="email" placeholder="nome@esempio.it" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block font-medium text-on-surface label-md" for="password">Password</label>
<a class="text-primary font-semibold text-sm hover:underline" href="#">Password dimenticata?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3.5 text-on-surface focus:ring-0 focus:bg-surface-container-low transition-all duration-200 border-b-2 border-transparent focus:border-primary placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="w-full py-4 px-6 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold rounded-full shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all duration-200 headline-sm mt-4" type="submit">
                        Login
                    </button>
</form>
<!-- Divider -->
<div class="relative my-10">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-surface-container-high"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-4 bg-surface-container-lowest text-outline italic">oppure accedi con</span>
</div>
</div>
<!-- Social Login Options -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-3 px-4 rounded-full bg-surface-container-low border border-outline-variant/10 hover:bg-surface-container-high transition-colors text-on-surface-variant font-medium">
<span class="material-symbols-outlined text-lg" data-icon="account_circle">account_circle</span>
<span>Google</span>
</button>
<button class="flex items-center justify-center gap-3 py-3 px-4 rounded-full bg-surface-container-low border border-outline-variant/10 hover:bg-surface-container-high transition-colors text-on-surface-variant font-medium">
<span class="material-symbols-outlined text-lg" data-icon="hub">hub</span>
<span>LinkedIn</span>
</button>
</div>
</div>
<!-- Registration Prompt -->
<div class="text-center mt-8">
<p class="text-on-surface-variant">
                    Non hai un account? 
                    <a class="text-primary font-bold ml-1 hover:underline" href="#">Registrazione</a>
</p>
</div>
<!-- Back to Home Link -->
<div class="mt-12 text-center">
<a class="inline-flex items-center gap-2 text-outline hover:text-primary transition-colors text-sm" href="#">
<span class="material-symbols-outlined text-sm" data-icon="arrow_back">arrow_back</span>
                    Torna alla Home
                </a>
</div>
</div>
</main>
<!-- Content Footer (Minimal for Login Screen) -->
<footer class="py-8 px-6 text-center text-outline text-xs">
<p>© 2024 Sondaggi Al Top. Tutti i diritti riservati.</p>
<div class="flex justify-center gap-6 mt-2">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Termini di Servizio</a>
</div>
</footer>
</body></html>
